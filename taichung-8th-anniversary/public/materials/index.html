<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus Life — 活動物料組｜台中市政店 8 週年</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="design-poster.jsx"></script>
<script type="text/babel" src="design-stands.jsx"></script>
<script type="text/babel" src="design-counter.jsx"></script>
<script type="text/babel" src="design-table.jsx"></script>
<script type="text/babel" src="design-richmenu.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #E8E4DC; font-family: 'DM Sans', 'Noto Sans TC', sans-serif; }
  @keyframes scan {
    0%   { top: -2px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes infDraw {
    0%, 100% { stroke-dashoffset: 0; }
    50% { stroke-dashoffset: 600; }
  }
  [data-dc-artboard-content] { font-family: 'DM Sans', 'Noto Sans TC', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#4A9EFF",
  "showCropMarks": false,
  "section": "all"
}/*EDITMODE-END*/;

function PrintAllPage({ w, h, children }) {
  // A4 at 96 dpi: 210mm = 793.7px ≈ 794, 297mm = 1122.5px ≈ 1123
  const A4W = 793.7, A4H = 1122.5;
  const s = Math.min(A4W / w, A4H / h);
  return (
    <div className="dc-print-page">
      {/* sized wrapper so the flexbox center point is correct */}
      <div style={{ width: w * s, height: h * s, flexShrink: 0, position: 'relative' }}>
        <div style={{ width: w, height: h, transform: `scale(${s})`, transformOrigin: 'top left',
          position: 'absolute', top: 0, left: 0, overflow: 'hidden' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

function PrintAllPageDuo({ w, h, children }) {
  // Two copies side-by-side stacked — A6 (105×148mm) × 2 fits perfectly on A4 portrait
  const A4W = 793.7, A4H = 1122.5;
  const s = Math.min(A4W / w, (A4H / 2) / h);
  const wrap = { width: w * s, height: h * s, flexShrink: 0, position: 'relative' };
  const inner = { width: w, height: h, transform: `scale(${s})`, transformOrigin: 'top left',
    position: 'absolute', top: 0, left: 0, overflow: 'hidden' };
  return (
    <div className="dc-print-page" style={{ flexDirection: 'column' }}>
      <div style={wrap}><div style={inner}>{React.cloneElement(children)}</div></div>
      <div style={wrap}><div style={inner}>{React.cloneElement(children)}</div></div>
    </div>
  );
}

function PrintAllLayout({ tweaks, urlMap }) {
  const origin = typeof window !== 'undefined' ? window.location.origin : '';
  const stampUrl = (n) => urlMap[n] ? `${origin}/stamp?id=${urlMap[n]}` : '';

  const elRef = React.useRef(null);
  if (!elRef.current) {
    const el = document.createElement('div');
    el.id = 'dc-print-all';
    document.body.appendChild(el);
    elRef.current = el;
  }
  React.useEffect(() => () => { if (elRef.current) elRef.current.remove(); }, []);

  return ReactDOM.createPortal(
    <>
      <PrintAllPage w={794} h={1123}><PosterA4 tweaks={tweaks} /></PrintAllPage>
      {STAMP_POINTS_MAIN.map(p => (
        <PrintAllPage key={p.n} w={378} h={567}><StampStand p={{...p, url: stampUrl(p.n)}} /></PrintAllPage>
      ))}
      {STAMP_POINTS_EGG.map(p => (
        <PrintAllPage key={p.n} w={378} h={567}><StampStand p={{...p, url: stampUrl(p.n)}} egg /></PrintAllPage>
      ))}
      <PrintAllPage w={794} h={1123}><CounterA4 tweaks={tweaks} /></PrintAllPage>
      <PrintAllPageDuo w={397} h={559}><TableA6 tweaks={tweaks} /></PrintAllPageDuo>
    </>,
    elRef.current,
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [urlMap, setUrlMap] = React.useState({});

  React.useEffect(() => {
    fetch('/api/admin/configs')
      .then(r => r.json())
      .then(d => {
        if (d.success) {
          const map = {};
          d.configs.forEach(c => { map[c.stamp_id] = c.uuid; });
          setUrlMap(map);
        }
      })
      .catch(() => {});
  }, []);

  const origin = typeof window !== 'undefined' ? window.location.origin : '';
  const stampUrl = (n) => urlMap[n] ? `${origin}/stamp?id=${urlMap[n]}` : '';

  const triggerPrintAll = React.useCallback(() => {
    document.body.classList.add('dc-batch-printing');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      window.print();
      document.body.classList.remove('dc-batch-printing');
    }));
  }, []);

  const showAll = tweaks.section === 'all';
  const S = (k) => showAll || tweaks.section === k;

  return (
    <>
      <DesignCanvas title="Nexus Life · 8TH 活動物料組" subtitle="TSUTAYA × WIRED TOKYO · 台中市政店 · 2026.04.25 – 05.24">

        {S('poster') && (
          <DCSection id="poster" title="01 · 活動主視覺海報 ── 印刷 A4 · 210×297mm">
            <DCArtboard id="p-a4" label="A4 印刷海報 · 210×297mm" width={794} height={1123}>
              <PosterA4 tweaks={tweaks} />
            </DCArtboard>
          </DCSection>
        )}

        {S('stand-main') && (
          <DCSection id="stand-main" title="02 · 集印點位立牌 + QR ── 主路徑 01–08 ｜ 10×15cm 護貝直式">
            {STAMP_POINTS_MAIN.map(p => (
              <DCArtboard key={p.n} id={`sm-${p.n}`} label={`${p.n} · ${p.loc}`} width={378} height={567}>
                <StampStand p={{...p, url: stampUrl(p.n)}} />
              </DCArtboard>
            ))}
          </DCSection>
        )}

        {S('stand-egg') && (
          <DCSection id="stand-egg" title="03 · 集印點位立牌 + QR ── 彩蛋 A · B · C ｜ 10×15cm 護貝直式">
            {STAMP_POINTS_EGG.map(p => (
              <DCArtboard key={p.n} id={`se-${p.n}`} label={`${p.n} · ${p.loc}`} width={378} height={567}>
                <StampStand p={{...p, url: stampUrl(p.n)}} egg />
              </DCArtboard>
            ))}
          </DCSection>
        )}

        {S('counter') && (
          <DCSection id="counter" title="06 · 櫃檯活動說明 ── A4 立卡">
            <DCArtboard id="c-a4" label="櫃檯 A4 立卡 · 210×297mm" width={794} height={1123}>
              <CounterA4 tweaks={tweaks} />
            </DCArtboard>
          </DCSection>
        )}

        {S('table') && (
          <DCSection id="table" title="07 · 餐廳桌卡 ── A6 平放">
            <DCArtboard id="t-a6" label="A6 桌卡 · 105×148mm" width={397} height={559}>
              <TableA6 tweaks={tweaks} />
            </DCArtboard>
          </DCSection>
        )}

      </DesignCanvas>

      <TweaksPanel title="Nexus Life · 物料檢視">
        <TweakSection label="檢視" />
        <TweakRadio
          label="分區"
          value={tweaks.section}
          options={['all','poster','stand-main','stand-egg','counter','table']}
          onChange={(v) => setTweak('section', v)}
        />
        <TweakSection label="列印" />
        <TweakButton label="全部列印 A4 (14 頁)" onClick={triggerPrintAll} />
      </TweaksPanel>

      <PrintAllLayout tweaks={tweaks} urlMap={urlMap} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
