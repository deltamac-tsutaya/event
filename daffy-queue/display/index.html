<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFE600">
<title>現場叫號看板｜Daffy 似顏繪</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yellow: #FFE600;
  --pink:   #FF2D78;
  --ink:    #1A1A1A;
  --white:  #FFFFFF;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--ink);
  -webkit-font-smoothing: antialiased;
}

.board {
  position: fixed;
  transform-origin: center center;
  transform: rotate(-90deg);
  width: 100vh;
  height: 100vw;
  top: calc((100vh - 100vw) / 2);
  left: calc((100vw - 100vh) / 2);
  z-index: 1;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════
   IMAGE PANEL (right side)
   ══════════════════════════════════════ */
.info-panel {
  flex: 0 0 54%;
  position: relative;
  overflow: hidden;
  background: var(--ink);
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
}

.slide.active { opacity: 1; }

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ══════════════════════════════════════
   QUEUE PANEL (left side)
   ══════════════════════════════════════ */
.queue-panel {
  flex: 1;
  background: var(--yellow);
  display: grid;
  grid-template-rows: auto 1fr auto;
  position: relative;
  overflow: hidden;
}

.queue-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.28) 2px, transparent 2.5px);
  background-size: 44px 44px;
  pointer-events: none;
}

/* ── Top: brand ── */
.q-top {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4vh 3vw 0;
  gap: 0.4vh;
  position: relative;
  z-index: 1;
}

.q-brand {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(1.4rem, 4vh, 40px);
  color: var(--ink);
  letter-spacing: 0.06em;
  line-height: 1;
}

.q-store {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: clamp(0.6rem, 1.6vh, 18px);
  font-weight: 700;
  color: var(--ink);
  opacity: 0.45;
  letter-spacing: 0.1em;
}

/* ── Centre: number ── */
.q-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5vh;
  position: relative;
  z-index: 1;
}

.call-label {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(1rem, 3vh, 32px);
  background: var(--ink);
  color: var(--yellow);
  padding: 0.35em 1.8em;
  border-radius: 999px;
  letter-spacing: 0.22em;
}

.big-num {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(100px, 22vh, 240px);
  line-height: 0.85;
  color: var(--pink);
  text-shadow: 6px 8px 0 var(--ink);
  letter-spacing: -0.02em;
  user-select: none;
}

.big-num.loading {
  color: var(--ink);
  opacity: 0.2;
  text-shadow: none;
  font-size: clamp(40px, 8vh, 80px);
}

@keyframes board-pop {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.12); }
  55%  { transform: scale(0.95); }
  80%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}

.big-num.pop {
  animation: board-pop 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
}

/* Live dot */
.live-row {
  display: flex;
  align-items: center;
  gap: 0.5em;
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(0.7rem, 2vh, 20px);
  color: var(--ink);
  opacity: 0.5;
}

.live-dot {
  width: clamp(8px, 1.4vh, 12px);
  height: clamp(8px, 1.4vh, 12px);
  border-radius: 50%;
  background: var(--pink);
  animation: pulse 1.8s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.3; transform: scale(0.55); }
}

/* ── Bottom: upcoming + time ── */
.q-bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 3vw 3vh;
  gap: 1vh;
  position: relative;
  z-index: 1;
  border-top: 2px solid rgba(26,26,26,0.1);
  margin: 0 4vw;
}

.upcoming-label {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(0.65rem, 1.8vh, 18px);
  color: var(--ink);
  opacity: 0.4;
  letter-spacing: 0.2em;
  padding-top: 1.2vh;
}

.upcoming-nums {
  display: flex;
  gap: clamp(1rem, 4vh, 3rem);
  align-items: baseline;
}

.upcoming-num {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(2.2rem, 9vh, 100px);
  color: var(--ink);
  opacity: 0.22;
  line-height: 1;
  min-width: 2ch;
  text-align: center;
}

.updated-info {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(0.6rem, 1.5vh, 16px);
  color: var(--ink);
  opacity: 0.3;
}
</style>
</head>
<body>

<div class="board">

  <!-- ── 叫號顯示（旋轉後在左側） ── -->
  <div class="queue-panel">
    <div class="q-top">
      <p class="q-brand">Daffy 似顏繪</p>
      <p class="q-store">TSUTAYA BOOKSTORE 信義店</p>
    </div>
    <div class="q-center">
      <span class="call-label">現在叫號</span>
      <div id="number" class="big-num loading" aria-live="assertive" aria-atomic="true">—</div>
      <div class="live-row"><span class="live-dot"></span>即時更新</div>
    </div>
    <div class="q-bottom">
      <span class="upcoming-label">即將叫號</span>
      <div class="upcoming-nums">
        <span class="upcoming-num" id="next-1">—</span>
        <span class="upcoming-num" id="next-2">—</span>
        <span class="upcoming-num" id="next-3">—</span>
      </div>
      <p class="updated-info">最後更新 <time id="updated-at">—</time></p>
    </div>
  </div>

  <!-- ── 圖片輪播（旋轉後在右側） ── -->
  <div class="info-panel">
    <div class="slide active"><img src="../1.jpg" alt=""></div>
    <div class="slide"><img src="../2.jpg" alt=""></div>
    <div class="slide"><img src="../3.jpg" alt=""></div>
    <div class="slide"><img src="../4.jpg" alt=""></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { firebaseConfig, QUEUE_PATH } from "../assets/config.js";

  const numEl     = document.getElementById("number");
  const updatedEl = document.getElementById("updated-at");
  const next1El   = document.getElementById("next-1");
  const next2El   = document.getElementById("next-2");
  const next3El   = document.getElementById("next-3");

  const WATCHDOG_MS = 45_000;
  let unsubscribe = null, watchdog = null, retryTimer = null, db;
  let prev = undefined;

  function fmt(d) {
    return [d.getHours(), d.getMinutes(), d.getSeconds()]
      .map(n => String(n).padStart(2, "0")).join(":");
  }

  function pop() {
    numEl.classList.remove("pop");
    void numEl.offsetWidth;
    numEl.classList.add("pop");
    numEl.addEventListener("animationend", () => numEl.classList.remove("pop"), { once: true });
  }

  function render(val) {
    updatedEl.textContent = fmt(new Date());
    if (val == null || Number.isNaN(Number(val))) {
      numEl.textContent = "尚未開始";
      numEl.classList.add("loading");
      next1El.textContent = "—";
      next2El.textContent = "—";
      next3El.textContent = "—";
    } else {
      const n = Number(val);
      numEl.textContent = String(n);
      numEl.classList.remove("loading");
      next1El.textContent = String(n + 1);
      next2El.textContent = String(n + 2);
      next3El.textContent = String(n + 3);
      if (prev !== undefined && prev !== n) pop();
      prev = n;
    }
    resetWatchdog();
  }

  function resetWatchdog() {
    clearTimeout(watchdog);
    watchdog = setTimeout(reconnect, WATCHDOG_MS);
  }

  function connect() {
    if (unsubscribe) return;
    clearTimeout(retryTimer);
    const queueRef = ref(db, QUEUE_PATH);
    unsubscribe = onValue(queueRef, snap => render(snap.val()), err => {
      console.error(err);
      numEl.textContent = "連線失敗";
      numEl.classList.add("loading");
      unsubscribe = null;
      retryTimer = setTimeout(connect, 5_000);
    });
    resetWatchdog();
  }

  function disconnect() {
    clearTimeout(watchdog); clearTimeout(retryTimer);
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  }

  function reconnect() { disconnect(); connect(); }

  // ── slideshow 30s per slide ──
  const slides = document.querySelectorAll(".slide");
  let cur = 0;
  setInterval(() => {
    slides[cur].classList.remove("active");
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add("active");
  }, 30000);

  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    connect();
    document.addEventListener("visibilitychange", () => {
      document.hidden ? disconnect() : connect();
    });
  } catch (e) {
    console.error(e);
    numEl.textContent = "設定錯誤";
    numEl.classList.add("loading");
  }
</script>

</body>
</html>
