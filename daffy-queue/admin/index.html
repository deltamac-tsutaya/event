<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A1A1A">
<title>後台叫號管理｜Daffy 似顏畫</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>

<div class="wrap">

  <header class="admin-header">
    <span class="admin-staff-badge">STAFF ONLY</span>
    <p class="admin-header-title">Daffy 似顏畫｜後台管理</p>
  </header>

  <!-- Login view -->
  <section id="login-view" class="login-box">
    <h2>請輸入工作人員密碼</h2>
    <form id="login-form" autocomplete="off">
      <input id="pw-input" type="password" inputmode="text"
             placeholder="密碼" aria-label="密碼" required>
      <div class="status" id="login-status"></div>
      <button class="btn btn-plus" type="submit" style="margin-top:0.5rem">登入</button>
    </form>
  </section>

  <!-- Admin view -->
  <section id="admin-view" class="hidden admin-panel">

    <div class="card admin-number-card">
      <span class="card-label">目前叫到</span>
      <div id="current" class="admin-current">—</div>
      <p class="updated">
        <span class="dot" aria-hidden="true"></span>
        <span>最後更新</span>
        <time id="updated-at">—</time>
      </p>
    </div>

    <button id="btn-plus" class="btn btn-plus btn-hero" type="button">
      ＋1　下一位
    </button>

    <div class="admin-secondary">
      <p class="admin-section-label">進階操作</p>

      <form id="jump-form" class="jump-form" autocomplete="off">
        <input id="jump-input" class="jump-input" type="number"
               inputmode="numeric" min="0" max="9999" step="1"
               placeholder="直接輸入號碼" aria-label="直接輸入號碼">
        <button class="btn btn-secondary" type="submit">跳號</button>
      </form>

      <div class="admin-row">
        <button id="btn-minus" class="btn btn-secondary" type="button">−1 上一位</button>
        <button id="btn-reset" class="btn btn-danger" type="button">歸零</button>
      </div>
    </div>

    <div id="status" class="status"></div>

    <a class="admin-link" href="../">← 返回顧客頁</a>

  </section>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { firebaseConfig, ADMIN_PASSWORD, QUEUE_PATH } from "../assets/config.js";

  const loginView   = document.getElementById("login-view");
  const adminView   = document.getElementById("admin-view");
  const loginForm   = document.getElementById("login-form");
  const pwInput     = document.getElementById("pw-input");
  const loginStatus = document.getElementById("login-status");

  const currentEl = document.getElementById("current");
  const updatedEl = document.getElementById("updated-at");
  const statusEl  = document.getElementById("status");
  const btnPlus   = document.getElementById("btn-plus");
  const btnMinus  = document.getElementById("btn-minus");
  const btnReset  = document.getElementById("btn-reset");
  const jumpForm  = document.getElementById("jump-form");
  const jumpInput = document.getElementById("jump-input");

  const SESSION_KEY = "daffy-queue-auth";
  let current  = null;
  let queueRef = null;

  function formatTime(date) {
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    const ss = String(date.getSeconds()).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.classList.toggle("error", Boolean(isError));
    if (msg && !isError) {
      setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ""; }, 2500);
    }
  }

  function showAdmin() {
    loginView.classList.add("hidden");
    adminView.classList.remove("hidden");
    initFirebase();
  }

  loginForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const val = pwInput.value.trim();
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, "1");
      loginStatus.textContent = "";
      showAdmin();
    } else {
      loginStatus.textContent = "密碼錯誤，請重試。";
      loginStatus.classList.add("error");
      pwInput.value = "";
      pwInput.focus();
    }
  });

  function initFirebase() {
    try {
      const app = initializeApp(firebaseConfig);
      const db  = getDatabase(app);
      queueRef  = ref(db, QUEUE_PATH);

      onValue(queueRef, (snap) => {
        const v = snap.val();
        current = (v == null || Number.isNaN(Number(v))) ? 0 : Number(v);
        currentEl.textContent = String(current);
        updatedEl.textContent = formatTime(new Date());
      }, (err) => {
        console.error(err);
        setStatus("資料庫連線失敗", true);
      });
    } catch (err) {
      console.error(err);
      setStatus("Firebase 設定錯誤，請檢查 config.js", true);
    }
  }

  async function writeNumber(n) {
    if (!queueRef) return;
    if (!Number.isFinite(n) || n < 0) { setStatus("請輸入有效號碼", true); return; }
    const clamped = Math.min(9999, Math.floor(n));
    try {
      await set(queueRef, clamped);
      setStatus(`已更新為 ${clamped}`);
    } catch (err) {
      console.error(err);
      setStatus("更新失敗，請重試", true);
    }
  }

  btnPlus.addEventListener("click", () => writeNumber((current ?? 0) + 1));
  btnMinus.addEventListener("click", () => writeNumber(Math.max(0, (current ?? 0) - 1)));
  btnReset.addEventListener("click", () => { if (confirm("確定要將叫號歸零嗎？")) writeNumber(0); });

  jumpForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const n = Number(jumpInput.value);
    if (!Number.isFinite(n)) { setStatus("請輸入數字", true); return; }
    writeNumber(n);
    jumpInput.value = "";
    jumpInput.blur();
  });

  // Press Enter (when not in an input) to trigger +1 — handy for keyboard / tablet use.
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && document.activeElement.tagName !== "INPUT") {
      e.preventDefault();
      btnPlus.click();
    }
  });

  if (sessionStorage.getItem(SESSION_KEY) === "1") {
    showAdmin();
  } else {
    pwInput.focus();
  }
</script>

</body>
</html>
