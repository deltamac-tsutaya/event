<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFE600">
<title>目前叫號｜Daffy 似顏畫 × TSUTAYA BOOKSTORE 信義店</title>
<meta name="description" content="Daffy 似顏畫活動現場叫號。請確認您的號碼，並留意現場廣播。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="wrap">

  <header class="brand">
    <svg class="mascot" viewBox="0 0 100 100" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <!-- Simple ghost-duck mascot, Daffy-style -->
      <path d="M50 10 C30 10, 18 25, 18 48 L18 86 C18 90, 22 92, 25 89 L32 83 C34 81, 37 81, 39 83 L44 88 C46 90, 49 90, 51 88 L56 83 C58 81, 61 81, 63 83 L70 89 C73 92, 77 90, 77 86 L77 48 C77 25, 70 10, 50 10 Z"
            fill="#FFFFFF" stroke="#1A1A1A" stroke-width="4" stroke-linejoin="round"/>
      <!-- eyes -->
      <circle cx="40" cy="46" r="4.5" fill="#1A1A1A"/>
      <circle cx="60" cy="46" r="4.5" fill="#1A1A1A"/>
      <circle cx="41.5" cy="44.5" r="1.4" fill="#FFFFFF"/>
      <circle cx="61.5" cy="44.5" r="1.4" fill="#FFFFFF"/>
      <!-- cheeks -->
      <circle cx="33" cy="58" r="4" fill="#FF2D78" opacity="0.75"/>
      <circle cx="67" cy="58" r="4" fill="#FF2D78" opacity="0.75"/>
      <!-- beak -->
      <path d="M44 58 Q50 65 56 58 Q50 62 44 58 Z" fill="#FF2D78" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
    <p class="brand-title">Daffy 似顏畫</p>
    <p class="brand-sub">TSUTAYA BOOKSTORE 信義店</p>
  </header>

  <section class="card" aria-live="polite">
    <span class="card-label">目前叫到</span>
    <div id="number" class="big-number loading">—</div>
    <p class="updated">
      <span class="dot" aria-hidden="true"></span>
      <span>最後更新</span>
      <time id="updated-at">—</time>
    </p>
  </section>

  <p class="note">
    預估等候時間僅供參考，請以現場叫號為準。
  </p>

  <a class="admin-link" href="admin/">STAFF</a>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { firebaseConfig, QUEUE_PATH } from "./assets/config.js";

  const numberEl = document.getElementById("number");
  const updatedEl = document.getElementById("updated-at");

  function formatTime(date) {
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    const ss = String(date.getSeconds()).padStart(2, "0");
    return `${hh}:${mm}:${ss}`;
  }

  function render(value) {
    if (value == null || Number.isNaN(Number(value))) {
      numberEl.textContent = "尚未開始";
      numberEl.classList.add("loading");
    } else {
      numberEl.textContent = String(Number(value));
      numberEl.classList.remove("loading");
    }
    updatedEl.textContent = formatTime(new Date());
  }

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const queueRef = ref(db, QUEUE_PATH);

    onValue(queueRef, (snap) => {
      render(snap.val());
    }, (err) => {
      console.error(err);
      numberEl.textContent = "連線失敗";
      numberEl.classList.add("loading");
    });
  } catch (err) {
    console.error(err);
    numberEl.textContent = "設定錯誤";
    numberEl.classList.add("loading");
  }

  // Auto-refresh every 30 seconds as a resilience fallback, in
  // case the realtime socket drops silently on mobile Safari.
  setTimeout(() => window.location.reload(), 30_000);
</script>

</body>
</html>
